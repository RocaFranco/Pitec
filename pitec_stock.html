<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pitec · Stock</title>
<link rel="stylesheet" href="pitec_estilo.css">
<script src="pitec_api.js"></script>
<style>
  main{padding-bottom:30px;max-width:none;width:auto;margin:18px 20px}
  .vtabs{display:flex;gap:8px;margin-bottom:14px}
  .vtab{background:var(--card);border:1px solid var(--line);color:var(--mut);font-weight:700;padding:11px 18px;border-radius:11px;cursor:pointer;font-size:14px}
  .vtab.on{background:var(--acc);color:#fff;border-color:var(--acc)}
  .tot{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:14px}
  .tot .kpi{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px;box-shadow:var(--shadow)}
  .tot .v{font-size:26px;font-weight:800;color:var(--acc-d)} .tot .l{font-size:12px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px;margin-top:3px}
  .grp{background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);overflow:hidden}
  .grp>h3{background:var(--card2);padding:11px 16px;font-size:15px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between}
  .grp>h3 .s{color:var(--mut);font-weight:600;font-size:13px}
  .buscar{width:100%;max-width:420px;padding:11px 14px;font-size:15px;border:1px solid var(--line);border-radius:10px;margin-bottom:12px;background:#fff}
  .matwrap{overflow-x:auto;background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow)}
  table.det{border-collapse:collapse;width:100%;font-size:13px;white-space:nowrap}
  table.det th,table.det td{border:1px solid #e3e8f0;padding:8px 11px;text-align:right}
  table.det th{background:#f0f3f8;color:var(--mut);text-transform:uppercase;font-size:10.5px;position:sticky;top:0}
  table.det td.l,table.det th.l{text-align:left}
  table.det td.cod{font-weight:700;color:var(--acc-d)}
  .loading{color:var(--mut);padding:20px;text-align:center}
</style>
</head>
<body>
<header>
  <h1>PITEC · <b>STOCK</b></h1>
  <span class="badge">DISPONIBLE</span>
  <span class="date" id="hoy"></span>
</header>
<main>
  <div class="vtabs">
    <div class="vtab on" id="vtRes" onclick="setView('res')">📊 Resumen</div>
    <div class="vtab" id="vtLis" onclick="setView('lis')">🔎 Listado / Buscar</div>
  </div>
  <div class="tot" id="totales"></div>
  <div id="vResumen">
    <h3 class="sec">Stock de bobinas por categoría y formato</h3>
    <div id="grupos"><div class="loading">Calculando stock desde el Sheet…</div></div>
  </div>
  <div id="vListado" class="hidden">
    <input class="buscar" id="q" placeholder="🔍 Buscar código, categoría, formato o telar…" oninput="renderListado()">
    <div class="matwrap"><div id="tabla" class="loading">Cargando…</div></div>
  </div>
</main>
<script>
document.getElementById('hoy').textContent=new Date().toLocaleDateString('es-AR',{weekday:'short',day:'2-digit',month:'2-digit'});
const num=v=>{const n=Number(v);return isNaN(n)?0:n;};
const fmt=n=>Math.round(n).toLocaleString('es-AR');
const fdate=v=>{const d=new Date(v);return isNaN(d)?'':d.toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'2-digit'});};
const COL={40:'#c79bc4',47:'#5b8fd6',53:'#b3b3b3',57:'#6aa84f',60:'#e83b3b',71:'#8a4b2a',82:'#e8923b',102:'#ec5ad0',120:'#f0d63a'};
const txtC=hex=>{const c=hex.replace('#','');return (parseInt(c.substr(0,2),16)*299+parseInt(c.substr(2,2),16)*587+parseInt(c.substr(4,2),16)*114)/1000>150?'#222':'#fff';};
let STOCKDET=[];

function setView(v){const r=v==='res';
  document.getElementById('vtRes').classList.toggle('on',r);document.getElementById('vtLis').classList.toggle('on',!r);
  document.getElementById('vResumen').classList.toggle('hidden',!r);document.getElementById('vListado').classList.toggle('hidden',r);}

async function cargar(){
  if(!apiListo()){document.getElementById('grupos').innerHTML='<div class="loading">Sin conexión</div>';return;}
  let tel,ent,lam,ext;
  try{ [tel,ent,lam,ext]=await Promise.all([
    apiGet({action:'read',sheet:'Telares'}),
    apiGet({action:'read',sheet:'Entregas'}),
    apiGet({action:'read',sheet:'Laminadora'}),
    apiGet({action:'read',sheet:'Bobinas Externas'})]); }
  catch(e){document.getElementById('grupos').innerHTML='<div class="loading">Error leyendo el Sheet</div>';return;}

  const entregadas=new Set((ent||[]).map(r=>String(r['Código Bobina']).trim()));
  const laminadas=new Set((lam||[]).map(r=>String(r['Código Madre']).trim()));
  const enStock=(cod,est)=>{est=String(est||'').toLowerCase();return est.indexOf('entreg')<0&&est.indexOf('lamin')<0&&!entregadas.has(cod)&&!laminadas.has(cod);};
  const madre={}; (tel||[]).forEach(r=>madre[String(r['Código Bobina']).trim()]={fmt:r['Formato'],forma:r['Forma']});

  STOCKDET=[];
  (tel||[]).forEach(r=>{ const cod=String(r['Código Bobina']).trim(); if(enStock(cod,r['Estado'])){
    const cat=String(r['Forma'])==='Plano'?'Plana':(r['Categoría']||'(sin cat.)');
    STOCKDET.push({cod,cat,forma:r['Forma']||'',fmt:r['Formato']||'?',telar:r['Nº Telar']||'',trama:r['Trama']||'',mts:num(r['Metros']),kg:num(r['Kg']),gram:r['Gramaje']||'',fecha:fdate(r['Fecha Hora Fin']||r['Fecha Hora Inicio']),estado:'En stock',det:''}); } });
  (lam||[]).forEach(r=>{ const cod=String(r['Código Hija']).trim(); if(cod && !entregadas.has(cod)){ const m=madre[String(r['Código Madre']).trim()]||{};
    STOCKDET.push({cod,cat:'Laminada',forma:m.forma||'Tubular',fmt:m.fmt||'?',telar:'',trama:'',mts:num(r['Metros Reales']),kg:num(r['Kg Laminados']),gram:r['Gr Promedio']?Math.round(num(r['Gr Promedio'])):'',fecha:fdate(r['Fecha']),estado:'Laminada',det:'Madre '+String(r['Código Madre']).trim()+(r['Color']?' · '+r['Color']:'')+(r['Lados']?' · '+r['Lados']+' lados':'')}); } });
  (ext||[]).forEach(r=>{ const cod=String(r['Código']).trim(); if(enStock(cod,r['Estado'])){
    STOCKDET.push({cod,cat:'Externa',forma:'Externa',fmt:r['Proveedor']||'—',telar:'',trama:'',mts:num(r['Metros']),kg:num(r['Kg']),gram:r['Gramaje']||'',fecha:fdate(r['Fecha']),estado:'Externa',det:r['Proveedor']||''}); } });

  const tk=STOCKDET.reduce((a,r)=>a+r.kg,0), tm=STOCKDET.reduce((a,r)=>a+r.mts,0);
  document.getElementById('totales').innerHTML=`
    <div class="kpi"><div class="v">${fmt(STOCKDET.length)}</div><div class="l">Bobinas en stock</div></div>
    <div class="kpi"><div class="v">${fmt(tk)}</div><div class="l">Kg en stock</div></div>
    <div class="kpi"><div class="v">${fmt(tm)}</div><div class="l">Metros en stock</div></div>`;

  // RESUMEN: agrupar por categoría → formato
  const g={};
  STOCKDET.forEach(r=>{ (g[r.cat]=g[r.cat]||{}); (g[r.cat][r.fmt]=g[r.cat][r.fmt]||{n:0,mts:0,kg:0});
    g[r.cat][r.fmt].n++; g[r.cat][r.fmt].mts+=r.mts; g[r.cat][r.fmt].kg+=r.kg; });
  const orden=['Para Laminar','Convencional','Laminada','Plana','Externa'];
  const cats=Object.keys(g).sort((a,b)=>{const ia=orden.indexOf(a),ib=orden.indexOf(b);return (ia<0?9:ia)-(ib<0?9:ib);});
  document.getElementById('grupos').innerHTML=cats.map(cat=>{
    const fms=Object.entries(g[cat]).sort((a,b)=>Number(a[0])-Number(b[0]));
    const subK=fms.reduce((a,[,v])=>a+v.kg,0), subN=fms.reduce((a,[,v])=>a+v.n,0);
    return `<div class="grp" style="margin-bottom:12px"><h3>${cat} <span class="s">${subN} bobinas · ${fmt(subK)} kg</span></h3>
      <table><thead><tr><th>Formato</th><th>Bobinas</th><th>Metros</th><th>Kg</th></tr></thead><tbody>${
      fms.map(([f,v])=>{const c=COL[f]; const cell=c?`style="background:${c};color:${txtC(c)};border-radius:6px;padding:2px 10px;font-weight:800"`:'style="font-weight:800"';
        return `<tr><td><span ${cell}>${f}</span></td><td>${v.n}</td><td>${fmt(v.mts)}</td><td>${fmt(v.kg)}</td></tr>`;}).join('')
      }</tbody></table></div>`;
  }).join('')||'<div class="loading">No hay bobinas en stock</div>';
  renderListado();
}
function renderListado(){
  const q=(document.getElementById('q').value||'').trim().toLowerCase();
  const rows=STOCKDET.filter(r=>!q || [r.cod,r.cat,r.fmt,r.telar,r.forma].join(' ').toLowerCase().includes(q))
    .sort((a,b)=>String(a.cod).replace(/\s/g,'').localeCompare(String(b.cod).replace(/\s/g,''),undefined,{numeric:true}));
  if(!rows.length){document.getElementById('tabla').innerHTML='<div class="loading">Sin resultados</div>';return;}
  let h=`<table class="det"><thead><tr><th class="l">Código</th><th class="l">Categoría</th><th class="l">Forma</th><th>Fto</th><th>Telar</th><th>Trama</th><th>Metros</th><th>Kg</th><th>Gramaje</th><th>Fecha</th><th class="l">Detalle</th></tr></thead><tbody>`;
  rows.forEach(r=>{ h+=`<tr><td class="l cod">${r.cod}</td><td class="l">${r.cat}</td><td class="l">${r.forma}</td><td>${r.fmt}</td><td>${r.telar}</td><td>${r.trama}</td><td>${fmt(r.mts)}</td><td>${fmt(r.kg)}</td><td>${r.gram}</td><td>${r.fecha}</td><td class="l">${r.det}</td></tr>`; });
  h+='</tbody></table>';
  document.getElementById('tabla').innerHTML=h;
}
cargar();
</script>
</body>
</html>
